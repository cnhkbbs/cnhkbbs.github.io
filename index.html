<!-- Vidage init -->
	<script src="dist/scripts/Vidage.min.js"></script>
	<script>
		new Vidage('#VidageVideo');
	</script>
<audio autoplay="autoplay" controls="controls"loop="loop" preload="auto" src="music/1.mp3"> 你的浏览器版本太低，不支持audio标签 </audio>
